body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
#root{width:100vw;height:100vh;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
#phase-off{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s;}

#power-btn svg{width:34px;height:34px;stroke:#1D9E75;fill:none;stroke-width:2.2;stroke-linecap:round;}
.hint{color:rgba(255,255,255,0.3);font-size:12px;margin-top:20px;letter-spacing:0.08em;}
#phase-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;opacity:0;pointer-events:none;transition:opacity 0.6s;}
#phase-loading.visible{opacity:1;pointer-events:auto;}
.loading-text{color:#fff;font-size:15px;letter-spacing:0.15em;}
.progress-track{width:220px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;width:0%;background:#1D9E75;border-radius:2px;transition:width 2.4s cubic-bezier(0.4,0,0.2,1);}
#phase-desktop{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity 0.8s;overflow:hidden;}
#phase-desktop.visible{opacity:1;pointer-events:auto;}
.desktop-bg {
  position: absolute;
  inset: 0;
  background: url('windows xp wallpaper.jpeg') center/cover no-repeat;
}
.desktop-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 70% 35%,rgba(255,255,255,0.12) 0%,transparent 55%);}
.taskbar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: clamp(30px, 4vh, 40px);
  background: linear-gradient(to bottom, #245edb, #1a47b0);
  display: flex;
  align-items: center;
  padding: 0 8px;
  z-index: 10;
}
.start-btn{background:linear-gradient(to bottom,#3fa33f,#2d7a2d);border:1px solid #1a5c1a;border-radius:10px;color:#fff;font-size:11px;font-weight:500;padding:3px 10px;cursor:pointer;}
.taskbar-clock{margin-left:auto;color:#fff;font-size:11px;background:rgba(0,0,0,0.2);padding:2px 8px;border-radius:3px;}
#icons-grid {
  position: absolute;
  top: 1.5vh;
  left: 1vw;
  display: grid;
  grid-template-columns: repeat(2, 8vw);
  gap: 2vh 0.5vw;
  z-index: 5;
  min-width: 120px;
}
.icon {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  width: 7.5vw;
  min-width: 60px;
  max-width: 80px;
  padding: 4px;
  border-radius: 4px;
  transition: background 0.15s;
}
.icon:hover{background:rgba(255,255,255,0.18);}
.icon-label {
  color: #fff;
  font-size: clamp(8px, 0.8vw, 11px);
  text-align: center;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.95);
  line-height: 1.3;
  word-break: break-word;
}
#win-overlay{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s;}
#win-overlay.visible{opacity:1;pointer-events:auto;}

#photo-viewer-overlay{

}
#photo-viewer-overlay.visible{opacity:1;pointer-events:auto;}

.photo-win{

  border:1px solid #888;
  border-radius:6px;
  box-shadow: 6px 6px 22px rgba(0,0,0,0.6);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.photo-win-titlebar{background:linear-gradient(to right,#245edb,#6fa0e0);padding:5px 8px;display:flex;align-items:center;justify-content:space-between;}
.photo-win-title{color:#fff;font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width: calc(100% - 60px);}
.photo-win-body{padding:10px 12px;display:flex;align-items:center;justify-content:center;background:#f5f3e6;}

#photo-img{width:100%;max-height:78vh;object-fit:contain;background:#fff;border:1px solid #c8d8f0;border-radius:4px;}

  cursor:pointer;font-size:18px;font-weight:900;color:#1a3c6e;
}
#photo-prev{left:10px;}
#photo-next{right:10px;}
#photo-prev:disabled,#photo-next:disabled{opacity:0.4;cursor:not-allowed;}
#photo-counter{position:absolute;left:0;right:0;bottom:14px;text-align:center;font-size:11px;color:rgba(0,0,0,0.55);font-weight:700;}
.photo-downloads{margin-top:8px;}
.photo-downloads a{display:inline-block;margin-right:8px;margin-top:4px;background:rgba(220,232,248,0.9);border:1px solid #b0c8e8;border-radius:3px;padding:4px 8px;font-size:11px;color:#1a4080;text-decoration:none;}
.photo-downloads a:hover{filter:brightness(1.06);}

.w-proj-screenshot-btn{background:linear-gradient(to bottom,#245edb,#1a47b0);border:1px solid #1a3ca0;border-radius:3px;padding:4px 10px;font-size:11px;font-weight:500;cursor:pointer;color:#fff;}
.w-proj-screenshot-btn:hover{filter:brightness(1.15);}
.w-proj-link{display:inline-block;background:linear-gradient(to bottom,#245edb,#1a47b0);border:1px solid #1a3ca0;border-radius:3px;padding:4px 10px;font-size:11px;font-weight:500;cursor:pointer;color:#fff;text-decoration:none;}
.w-proj-link:hover{filter:brightness(1.15);}
.win {

  border-radius: 6px 6px 4px 4px;
  box-shadow: 4px 4px 16px rgba(0,0,0,0.5);

.win-titlebar{background:linear-gradient(to right,#245edb,#6fa0e0);border-radius:5px 5px 0 0;padding:5px 8px;display:flex;align-items:center;justify-content:space-between;}
.win-title{color:#fff;font-size:11px;font-weight:500;}
.win-controls{display:flex;gap:5px;align-items:center;}
.win-btn{width:14px;height:14px;border-radius:50%;border:0.5px solid rgba(0,0,0,0.25);cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;}
.win-btn .ico{display:none;font-size:7px;font-weight:900;color:rgba(0,0,0,0.6);position:absolute;}
.win-btn:hover .ico{display:flex;}
.win-btn.close{background:#ff5f57;}
.win-btn.min{background:#ffbd2e;}
.win-btn.max{background:#28c840;}
.win-body {

.w-tag.orange{background:#fce8d4;color:#803010;border-color:#e8c0a0;}

.contact-row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #ddd;border-radius:4px;padding:8px 10px;margin-bottom:6px;}

@media (max-width: 768px) {
  #icons-grid {
    grid-template-columns: repeat(2, 18vw);

    top: 1vh;
    left: 1vw;

  .icon {
    width: 16vw;
    min-width: 50px;
  }
  .icon-label {
    font-size: clamp(7px, 2vw, 10px);
  }
  .win {

  }
  .win-body {
    max-height: 45vh;
  }
}

@media (max-width: 480px) {
  #icons-grid {
    grid-template-columns: repeat(2, 22vw);
  }
  .icon {
    width: 20vw;
  }
  .win {
    width: 92vw;
  }
}

    'Screen Shot 2026-06-25 at 5.02.08 PM.png',
    'Screen Shot 2026-06-25 at 5.02.32 PM.png'
  ],
  'cpp-oop': [
    'Screen Shot 2026-06-25 at 6.02.28 PM.png',
    'Class Definition copy.jpg'
  ]
};

var projectDocuments = {
  'cpp-oop': [
    'allclasses copy.doc',
    'main copy.doc',
    'sim copy h.doc',
    'sim copy.doc',
    'task4 copy.doc'
  ]
};

var photoState = { images: [], docs: [], index: 0, projectName: '' };

function showPhotoViewer(projectId, projectName) {
  var images = (projectScreenshots[projectId] || []).filter(Boolean);
  var docs = (projectDocuments && projectDocuments[projectId]) ? projectDocuments[projectId].filter(Boolean) : [];

  photoState.images = images;
  photoState.docs = docs;
  photoState.index = 0;
  photoState.projectName = projectName || '';

  var title = 'Picture and Fax Viewer — ' + (photoState.projectName || projectId);
  document.getElementById('photo-win-title').textContent = title;

  var overlay = document.getElementById('photo-viewer-overlay');
  overlay.classList.add('visible');
  overlay.setAttribute('aria-hidden', 'false');

  var imgEl = document.getElementById('photo-img');
  imgEl.src = images.length ? images[0] : '';

  var counter = document.getElementById('photo-counter');
  counter.textContent = images.length ? ('1 / ' + images.length) : '0 / 0';

  var prevBtn = document.getElementById('photo-prev');
  var nextBtn = document.getElementById('photo-next');
  prevBtn.disabled = (images.length <= 1);
  nextBtn.disabled = (images.length <= 1);

  function renderDocs() {
    var downloads = document.getElementById('photo-doc-downloads');
    downloads.innerHTML = '';
    if (!docs || docs.length === 0) return;

    downloads.style.display = 'block';
    docs.forEach(function(path) {
      var fileName = path.split('/').pop();
      var a = document.createElement('a');
      a.href = path;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.textContent = '📄 ' + fileName;
      downloads.appendChild(a);
    });
  }

  function updateViewer() {
    if (!photoState.images || photoState.images.length === 0) return;
    imgEl.src = photoState.images[photoState.index];
    counter.textContent = (photoState.index + 1) + ' / ' + photoState.images.length;
    prevBtn.disabled = (photoState.index === 0);
    nextBtn.disabled = (photoState.index === photoState.images.length - 1);
  }

  // Wire nav once per open
  prevBtn.onclick = function() {
    photoState.index = Math.max(0, photoState.index - 1);
    updateViewer();
  };
  nextBtn.onclick = function() {
    photoState.index = Math.min(photoState.images.length - 1, photoState.index + 1);
    updateViewer();
  };

  renderDocs();
}

function closePhotoViewer() {
  var overlay = document.getElementById('photo-viewer-overlay');
  overlay.classList.remove('visible');
  overlay.setAttribute('aria-hidden', 'true');
}

function closeWin() {
  var o = document.getElementById('win-overlay');
  o.style.opacity = '0';
  setTimeout(function() {
    o.classList.remove('visible');
    o.style.opacity = '';
  }, 400);
}

document.getElementById('close-btn').addEventListener('click', closeWin);
document.getElementById('ok-btn').addEventListener('click', closeWin);

document.getElementById('photo-close-btn').addEventListener('click', closePhotoViewer);

document.getElementById('photo-viewer-overlay').addEventListener('click', function(e) {
  // Close when clicking backdrop (not inside the photo-win)
  if (e.target && e.target.id === 'photo-viewer-overlay') closePhotoViewer();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    // If either overlay is visible, close it.
    var photo = document.getElementById('photo-viewer-overlay');
    if (photo && photo.classList.contains('visible')) {
      closePhotoViewer();
      return;
    }
    var win = document.getElementById('win-overlay');
    if (win && win.classList.contains('visible')) closeWin();
  }
});


var grid = document.getElementById('icons-grid');
files.forEach(function(f) {
  var el = document.createElement('div');
  el.className = 'icon';
  el.innerHTML = folderSVG() + '<span class="icon-label">' + f.label + '</span>';
  el.addEventListener('click', function() { openWin(f.key, f.label); });
  grid.appendChild(el);
});

// Project cards: screenshot button opens the large Picture & Fax Viewer overlay
// (independent overlay; project list window stays open)
document.getElementById('win-overlay').addEventListener('click', function(e) {
  var t = e.target;
  if (!t) return;
  if (t.classList && t.classList.contains('w-proj-screenshot-btn')) {
    var projectId = t.getAttribute('data-project');
    // Title needs the human name, reuse the existing card title via parent lookup.
    var card = t.closest('.w-proj');
    var projectName = card ? (card.querySelector('.w-proj-title') ? card.querySelector('.w-proj-title').textContent.trim() : '') : '';
    showPhotoViewer(projectId, projectName);
  }
});

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}
updateClock();
setInterval(updateClock, 1000);

function resetToStart() {
  closeWin();
  var desktop = document.getElementById('phase-desktop');
  desktop.style.opacity = '0';
  setTimeout(function() {
    desktop.classList.remove('visible');
    desktop.style.opacity = '';
    document.getElementById('prog').style.transition = 'none';
    document.getElementById('prog').style.width = '0%';
    document.getElementById('load-label').textContent = 'Loading';
    document.getElementById('phase-loading').classList.remove('visible');
    var off = document.getElementById('phase-off');
    off.classList.remove('hidden');
    off.style.opacity = '1';
  }, 700);
}

document.getElementById('start-btn').addEventListener('click', resetToStart);

var dots = 0;
var dotInterval;

document.getElementById('power-btn').addEventListener('click', function() {
  var off = document.getElementById('phase-off');
  off.classList.add('hidden');
  setTimeout(function() {
    var loading = document.getElementById('phase-loading');
    loading.classList.add('visible');
    dotInterval = setInterval(function() {
      dots = (dots + 1) % 4;
      document.getElementById('load-label').textContent = 'Loading' + '.'.repeat(dots);
    }, 400);
    setTimeout(function() {
      document.getElementById('prog').style.transition = 'width 2.4s cubic-bezier(0.4,0,0.2,1)';
      document.getElementById('prog').style.width = '100%';
    }, 100);
    setTimeout(function() {
      clearInterval(dotInterval);
      dots = 0;
      loading.classList.remove('visible');
      setTimeout(function() {
        document.getElementById('phase-desktop').classList.add('visible');
        openWin('welcome', 'Welcome');
      }, 700);

    }, 2800);
  }, 700);
});
</script>
